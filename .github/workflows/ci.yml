name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

  api-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      matrix:
        environment: [local, dev, uat, preprod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API smoke tests (${{ matrix.environment }})
        if: github.event_name == 'pull_request'
        run: npm run test:api:smoke
        env:
          TEST_ENV: ${{ matrix.environment }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Run API regression tests (${{ matrix.environment }})
        if: github.event_name == 'push'
        run: npm run test:api
        env:
          TEST_ENV: ${{ matrix.environment }}
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Upload API test reports (${{ matrix.environment }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reports-${{ matrix.environment }}
          path: reports/
          retention-days: 14

  ui-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    strategy:
      matrix:
        environment: [local, dev, uat, preprod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI smoke tests (${{ matrix.environment }})
        if: github.event_name == 'pull_request'
        run: npm run test:ui:smoke
        env:
          TEST_ENV: ${{ matrix.environment }}
          HEADLESS: 'true'
          CI: 'true'

      - name: Run UI regression tests (${{ matrix.environment }})
        if: github.event_name == 'push'
        run: npm run test:ui
        env:
          TEST_ENV: ${{ matrix.environment }}
          HEADLESS: 'true'
          CI: 'true'

      - name: Upload UI test reports (${{ matrix.environment }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-reports-${{ matrix.environment }}
          path: reports/
          retention-days: 14

      - name: Upload failure screenshots (${{ matrix.environment }})
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ matrix.environment }}
          path: reports/screenshots/
          retention-days: 14
