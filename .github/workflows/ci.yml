name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # In a real pipeline, environment-specific test runs would be triggered
  # by deployment events (e.g. workflow_run after a deploy workflow completes).
  # Example:
  #   workflow_dispatch:
  #     inputs:
  #       environment:
  #         type: choice
  #         options: [dev, uat, preprod]
  #       test_scope:
  #         type: choice
  #         options: [smoke, regression]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

  # ── PR: smoke tests against local only (fast feedback) ─────────────
  # ── Push to master: full regression against local ──────────────────
  # In a real pipeline, post-deployment tests against dev/uat/preprod
  # would be triggered separately after successful deployment to each
  # environment (e.g. via workflow_dispatch or workflow_run).

  api-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run API smoke tests
        if: github.event_name == 'pull_request'
        run: npm run test:api:smoke
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Run API regression tests
        if: github.event_name == 'push'
        run: npm run test:api
        env:
          REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

      - name: Upload API test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reports
          path: reports/
          retention-days: 14

  ui-tests:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI smoke tests
        if: github.event_name == 'pull_request'
        run: npm run test:ui:smoke
        env:
          HEADLESS: 'true'
          CI: 'true'

      - name: Run UI regression tests
        if: github.event_name == 'push'
        run: npm run test:ui
        env:
          HEADLESS: 'true'
          CI: 'true'

      - name: Upload UI test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-reports
          path: reports/
          retention-days: 14

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: reports/screenshots/
          retention-days: 14
